# Project identification
sonar.projectKey=notes-app-backend
sonar.projectName=Notes App Backend
sonar.projectVersion=1.0.0

# Path to source files
sonar.sources=src
sonar.tests=tests

# Language settings
sonar.language=js
sonar.sourceEncoding=UTF-8

# Exclusions (Don't scan node_modules or tests for coverage)
sonar.exclusions=**/node_modules/**, **/logs/**, **/database/migrations/**
sonar.test.exclusions=tests/**/*.test.js

# Coverage reporting (NYC generates these)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
